spring.application.name=crypto-trading-api

# ========================================
# Crypto Trading Signal API - Configuration
# ========================================

server.port=8080

# ========================================
# Binance API Configuration
# ========================================
binance.api.base-url=https://fapi.binance.com
binance.api.key=
binance.api.secret=
# Testnet: https://testnet.binancefuture.com
binance.api.testnet=false

# ========================================
# Bybit API Configuration
# ========================================
bybit.api.base-url=https://api.bybit.com
bybit.api.key=
bybit.api.secret=

# ========================================
# Exchange padr„o
# ========================================
trading.default-exchange=BINANCE

# ========================================
# Par‚metros de Indicadores Tťcnicos
# ========================================

# RSI
indicator.rsi.period=14
indicator.rsi.overbought=70
indicator.rsi.oversold=30

# MACD
indicator.macd.fast-period=12
indicator.macd.slow-period=26
indicator.macd.signal-period=9

# EMA (para suporte ao MACD)
indicator.ema.short=9
indicator.ema.medium=21
indicator.ema.long=50

# ========================================
# Par‚metros de Gest„o de Risco
# ========================================
risk.default-stop-loss-percent=2.0
risk.default-take-profit-multiplier=2.0
risk.max-risk-per-trade=1.0

# ========================================
# Scanner de Mercado
# ========================================
scanner.default-min-volume-usdt=50000000
scanner.default-top-symbols=80
scanner.thread-pool-size=10
scanner.candles-per-asset=100

# ========================================
# Cache
# ========================================
spring.cache.type=caffeine
# signals e indicators: cache curto (30s)
# scanResults: cache mais longo (3min) pois o scan ť pesado
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=180s

# ========================================
# Actuator
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ========================================
# Logging
# ========================================
logging.level.com.cryptotrading=INFO
logging.level.org.springframework.web=WARN

# ========================================
# Swagger
# ========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method